<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Berhasil</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b1220;
    font-family: 'Segoe UI', sans-serif;
    overflow:hidden;
}

/* Glow Background */
body::before{
    content:"";
    position:absolute;
    left:0;
    top:0;
    width:8px;
    height:100%;
    background:linear-gradient(to bottom, red, #ff0040);
    box-shadow:0 0 30px red;
}

body::after{
    content:"";
    position:absolute;
    right:0;
    top:0;
    width:8px;
    height:100%;
    background:linear-gradient(to bottom, blue, #0040ff);
    box-shadow:0 0 30px blue;
}

/* Card */
.card{
    background:#111827;
    padding:40px;
    border-radius:25px;
    text-align:center;
    width:350px;
    position:relative;
    box-shadow:
        -5px 0 25px rgba(255,0,0,0.6),
        5px 0 25px rgba(0,0,255,0.6);
}

h2{
    color:white;
    margin-bottom:15px;
    letter-spacing:1px;
}

p{
    color:#cbd5e1;
    font-size:14px;
}

/* Spinner */
.loader{
    margin:20px auto;
    width:50px;
    height:50px;
    border:5px solid #1f2937;
    border-top:5px solid #6366f1;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{ transform:rotate(0deg); }
    100%{ transform:rotate(360deg); }
}

a{
    color:#60a5fa;
    text-decoration:none;
    font-weight:bold;
}
a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="card">
    <div class="loader"></div>
    <h2>LOGIN BERHASIL</h2>
    <!-- <p>Jika halaman status tidak muncul klik 
        <a href="#">disini</a>
    </p> -->
</div>

</body>
</html>
